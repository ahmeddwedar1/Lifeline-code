version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lifeline-postgres
    environment:
      POSTGRES_DB: lifeline_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifeline-network

  redis:
    image: redis:7-alpine
    container_name: lifeline-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifeline-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lifeline-server
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/lifeline_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_super_secret_jwt_key_min_32_chars
      JWT_REFRESH_SECRET: your_refresh_secret_key_here
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USER: your_email@gmail.com
      EMAIL_PASS: your_app_password
      CLIENT_URL: http://localhost:3000
      SALT_ROUNDS: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - lifeline-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: lifeline-client
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - lifeline-network

  nginx:
    image: nginx:alpine
    container_name: lifeline-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - server
      - client
    networks:
      - lifeline-network

volumes:
  pgdata:
  redisdata:

networks:
  lifeline-network:
    driver: bridge
